name: Build Windows EXE

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g. v1.0)
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
      with:
        lfs: true
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Speeds up subsequent runs
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install .
        
    - name: Build EXE with PyInstaller
      run: |
        if (Test-Path "icon.ico") {
          Write-Host "Found icon.ico, adding to build..."
          pyinstaller --onefile --name SpotDLextended --collect-all spotdlextended --collect-all spotify_scraper --add-binary "bin/sockseek.exe;." --icon=icon.ico spotdlextended/__main__.py
        } else {
          Write-Host "No icon.ico found, building without an icon..."
          pyinstaller --onefile --name SpotDLextended --collect-all spotdlextended --collect-all spotify_scraper --add-binary "bin/sockseek.exe;." spotdlextended/__main__.py
        }
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SpotDLextended-EXE
        path: dist/SpotDLextended.exe

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/SpotDLextended.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}